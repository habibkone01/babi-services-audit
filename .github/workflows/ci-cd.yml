name: CI/CD Babi Services

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # 1. Tests backend (PHPUnit)
  # ─────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: babiservice_test
          MYSQL_USER: babiuser
          MYSQL_PASSWORD: babipass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u babiuser -pbabipass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, zip
          coverage: xdebug

      - name: Installer les dépendances Composer
        working-directory: babi
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Créer le fichier .env pour les tests
        working-directory: babi
        run: |
          cat <<EOF > .env
          APP_NAME=BabiServices
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=babiservice_test
          DB_USERNAME=babiuser
          DB_PASSWORD=babipass
          EOF

      - name: Générer la clé d'application
        working-directory: babi
        run: php artisan key:generate

      - name: Lancer les migrations
        working-directory: babi
        run: php artisan migrate --force

      - name: Lancer les tests PHPUnit avec couverture
        working-directory: babi
        run: php artisan test --coverage --min=60

  # ─────────────────────────────────────────────
  # 2. Build & lint frontend (React)
  # ─────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/mon-app-react/package-lock.json

      - name: Installer les dépendances
        working-directory: front/mon-app-react
        run: npm ci

      - name: Linter le code
        working-directory: front/mon-app-react
        run: npm run lint

      - name: Build de production
        working-directory: front/mon-app-react
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Tests End-to-End (Cypress) sur la stack complète
  # ─────────────────────────────────────────────
  e2e-cypress:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Créer le fichier .env backend pour Docker
        run: |
          cat <<EOF > babi/.env
          APP_NAME=BabiServices
          APP_ENV=local
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost:8000
          DB_CONNECTION=mysql
          DB_HOST=mysql
          DB_PORT=3306
          DB_DATABASE=babiservice
          DB_USERNAME=babiuser
          DB_PASSWORD=babipass
          EOF

      - name: Démarrer la stack Docker complète
        run: docker compose up -d --build

      - name: Attendre que le backend soit prêt
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000 > /dev/null; then
              echo "Backend prêt !"
              break
            fi
            echo "En attente du backend... ($i/30)"
            sleep 5
          done

      - name: Générer la clé d'application (conteneur)
        run: docker compose exec -T back php artisan key:generate

      - name: Lancer les migrations (conteneur)
        run: docker compose exec -T back php artisan migrate --force

      - name: Installer les dépendances front (pour Cypress)
        working-directory: front/mon-app-react
        run: npm ci

      - name: Lancer les tests Cypress
        working-directory: front/mon-app-react
        run: npm run cypress:run

      - name: Récupérer les screenshots en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: front/mon-app-react/cypress/screenshots

      - name: Arrêter la stack Docker
        if: always()
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # 4. Déploiement (uniquement si push sur main)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, e2e-cypress]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Railway CLI
        run: npm install -g @railway/cli

      - name: Déployer sur Railway
        run: railway up --service back --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}