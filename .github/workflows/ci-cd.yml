name: CI/CD Babi Services

on:
  push:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # 1. Tests backend (PHPUnit)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: babiservice_test
          MYSQL_USER: babiuser
          MYSQL_PASSWORD: babipass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u babiuser -pbabipass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, zip
          coverage: xdebug

      - name: Installer les dépendances Composer
        working-directory: babi
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Créer le fichier .env pour les tests
        working-directory: babi
        run: |
          cat > .env << EOF
          APP_NAME=BabiServices
          APP_ENV=testing
          APP_KEY=
          APP_DEBUG=true
          APP_URL=http://localhost
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=babiservice_test
          DB_USERNAME=babiuser
          DB_PASSWORD=babipass
          EOF

      - name: Générer la clé d'application
        working-directory: babi
        run: php artisan key:generate

      - name: Lancer les migrations
        working-directory: babi
        run: php artisan migrate --force

      - name: Lancer les tests PHPUnit avec couverture
        working-directory: babi
        run: php artisan test --coverage --min=60

  # ─────────────────────────────────────────────
  # 2. Build & lint frontend (React)
  # ─────────────────────────────────────────────
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: front/mon-app-react/package-lock.json

      - name: Installer les dépendances
        working-directory: front/mon-app-react
        run: npm ci

      - name: Linter le code
        working-directory: front/mon-app-react
        run: npm run lint

      - name: Build de production
        working-directory: front/mon-app-react
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Scan de sécurité Trivy (images Docker)
  # ─────────────────────────────────────────────
  trivy-scan:
    name: Scan Trivy
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan image backend (php:8.4-fpm-alpine)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'php:8.4-fpm-alpine'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Scan image frontend (nginx:alpine)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nginx:alpine'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Scan image base de données (mysql:8.0)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mysql:8.0'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────────────────────────
  # 4. Déploiement (uniquement si push sur main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy sur Railway
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, trivy-scan]
    steps:
      - name: Installer Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway redeploy --service e64f19f6-8650-4981-b39a-f52dd758c841 --environment cf72ac4f-363d-42c5-99e7-633a1c0f381f --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend
        run: railway redeploy --service e728ee0d-a54e-420e-85e6-33d15e4bef89 --environment cf72ac4f-363d-42c5-99e7-633a1c0f381f --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}