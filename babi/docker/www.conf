[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

; Mode dynamique : PHP-FPM ajuste le nombre de workers entre min et max
; selon la charge, au lieu du unique process séquentiel de "artisan serve"
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeout adapté aux requêtes lentes
request_terminate_timeout = 60s

catch_workers_output = yes
decorate_workers_output = no
